###############################################
# MediaMTX configuration for video-analyzer
# 4-channel WebRTC streaming from UVC cameras
###############################################

# Log level: debug, info, warn, error
logLevel: info

# ─── Authentication ──────────────────────────
# In MediaMTX v1.x, API/playback/publish all require auth by default.
# For LAN deployment we allow anonymous access from any IP for read+API,
# but require explicit auth for publishing (protects against rogue pushes).
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: metrics
      - action: pprof
      - action: read
      - action: playback
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish

# ─── API ─────────────────────────────────────
api: yes
apiAddress: :9997

# ─── RTSP server (receives streams from FFmpeg) ─
rtsp: yes
rtspAddress: :8554
protocols: [tcp]

# ─── WebRTC server (serves streams to browsers) ─
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
# Allow CORS so VMS web (running on a different port like :3000) can call WHEP
webrtcAllowOrigin: '*'
# Advertise the LAN IP so that ICE candidates point to a reachable address
# (Replace with your AGX LAN IP if it changes)
webrtcAdditionalHosts: [192.168.3.34]
# In LAN, STUN is unnecessary and may slow down ICE; keep empty
webrtcICEServers2: []

# ─── HLS fallback (for browsers without WebRTC H.264) ─
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsAllowOrigin: '*'

# ─── Recording (for event playback) ──────────
# All paths inherit these defaults unless overridden in `paths:`.
# Segments are written as fmp4 to NVMe SSD and auto-deleted after 7 days.
# Event API queries by timestamp to extract the matching clip.
pathDefaults:
  record: yes
  recordPath: /mnt/nova_ssd/recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 60s
  recordDeleteAfter: 168h

# ─── Playback server (HTTP API to fetch recorded clips by time) ─
playback: yes
playbackAddress: :9996

# ─── Stream paths ────────────────────────────
# FFmpeg pushes to rtsp://localhost:8554/cam0..cam3
# Browsers connect via WebRTC at http://<IP>:8889/cam0..cam3
paths:
  cam0:
  cam1:
  cam2:
  cam3:
